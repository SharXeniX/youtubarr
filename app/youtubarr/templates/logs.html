{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="display-6 fw-semibold mb-0">Logs <small class="text-muted fs-6" id="log-count"></small></h1>
  <div class="d-flex gap-2 align-items-center">
    <select id="level-filter" class="form-select form-select-sm" style="width:auto;">
      <option value="">All levels</option>
      <option value="INFO">INFO</option>
      <option value="WARNING">WARNING</option>
      <option value="ERROR">ERROR</option>
    </select>
    <button id="btn-clear" class="btn btn-sm btn-outline-danger">Clear logs</button>
    <span id="auto-status" class="text-muted small"></span>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-sm table-hover mb-0" style="font-size: 0.85rem;">
      <thead class="table-light">
        <tr>
          <th style="width:10rem;">Time</th>
          <th style="width:5rem;">Level</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="log-tbody">
        <tr><td colspan="3" class="text-muted text-center py-3">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<nav class="mt-3" id="pagination">
  <ul class="pagination pagination-sm justify-content-center"></ul>
</nav>

<script>
(function() {
  const API = '{% url "logs-api" %}';
  const CLEAR_API = '{% url "logs-clear" %}';
  const tbody = document.getElementById('log-tbody');
  const pagEl = document.getElementById('pagination').querySelector('ul');
  const countEl = document.getElementById('log-count');
  const statusEl = document.getElementById('auto-status');
  const levelFilter = document.getElementById('level-filter');

  let currentPage = 1;
  let lastId = 0;
  let pollTimer = null;

  function levelClass(level) {
    if (level === 'ERROR') return 'danger';
    if (level === 'WARNING') return 'warning text-dark';
    return 'info';
  }

  function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderRow(e) {
    return `<tr data-id="${e.id}">
      <td class="text-nowrap text-monospace">${escHtml(e.timestamp)}</td>
      <td><span class="badge bg-${levelClass(e.level)}">${escHtml(e.level)}</span></td>
      <td class="text-monospace" style="white-space:pre-wrap;word-break:break-word;">${escHtml(e.message)}</td>
    </tr>`;
  }

  function renderPagination(data) {
    pagEl.innerHTML = '';
    if (data.num_pages <= 1) return;

    const mk = (label, page, disabled, active) => {
      const li = document.createElement('li');
      li.className = 'page-item' + (disabled ? ' disabled' : '') + (active ? ' active' : '');
      const a = document.createElement(disabled || active ? 'span' : 'a');
      a.className = 'page-link';
      a.innerHTML = label;
      if (!disabled && !active) {
        a.href = '#';
        a.onclick = (ev) => { ev.preventDefault(); loadPage(page); };
      }
      li.appendChild(a);
      pagEl.appendChild(li);
    };

    mk('&#x2039;', data.page - 1, !data.has_prev, false);
    for (let i = 1; i <= data.num_pages; i++) {
      if (i === 1 || i === data.num_pages || (i >= data.page - 2 && i <= data.page + 2)) {
        mk(i, i, false, i === data.page);
      } else if (i === data.page - 3 || i === data.page + 3) {
        mk('...', 0, true, false);
      }
    }
    mk('&#x203A;', data.page + 1, !data.has_next, false);
  }

  function loadPage(page) {
    currentPage = page;
    const level = levelFilter.value;
    const url = `${API}?page=${page}&per_page=50${level ? '&level=' + level : ''}`;
    fetch(url)
      .then(r => r.json())
      .then(data => {
        countEl.textContent = `(${data.total})`;
        if (!data.entries.length) {
          tbody.innerHTML = '<tr><td colspan="3" class="text-muted text-center py-3">No logs.</td></tr>';
        } else {
          tbody.innerHTML = data.entries.map(renderRow).join('');
          // Track latest id for polling
          data.entries.forEach(e => { if (e.id > lastId) lastId = e.id; });
        }
        renderPagination(data);
      });
  }

  function pollNew() {
    if (currentPage !== 1) return; // only poll on first page
    const level = levelFilter.value;
    const url = `${API}?after=${lastId}${level ? '&level=' + level : ''}`;
    fetch(url)
      .then(r => r.json())
      .then(data => {
        if (!data.entries.length) return;
        const empty = tbody.querySelector('td.text-muted');
        if (empty) empty.closest('tr').remove();

        data.entries.forEach(e => {
          tbody.insertAdjacentHTML('afterbegin', renderRow(e));
          if (e.id > lastId) lastId = e.id;
        });
        statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
        // Refresh count
        loadPage(1);
      });
  }

  // Clear logs
  document.getElementById('btn-clear').onclick = () => {
    if (!confirm('Clear all logs?')) return;
    fetch(CLEAR_API, {
      method: 'POST',
      headers: {'X-CSRFToken': document.cookie.match(/csrftoken=([^;]+)/)?.[1] || ''}
    }).then(() => {
      lastId = 0;
      loadPage(1);
    });
  };

  // Level filter
  levelFilter.onchange = () => loadPage(1);

  // Initial load
  loadPage(1);

  // Auto-refresh every 60s
  pollTimer = setInterval(pollNew, 60000);
})();
</script>
{% endblock %}
